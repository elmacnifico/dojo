concurrency: 4
# Bind the example SUT away from :8080 so local apps (e.g. another HTTP server)
# on 8080 do not prevent the suite from starting. The SUT reads PORT; triggers use sut_base_url.
sut_base_url: "http://127.0.0.1:29473"
sut_command: "PORT=29473 go run ../../sut/main.go"
timeouts:
  perform: 5s
  expect: 2s

apis:
  gemini:
    mode: mock
    url: "/v1beta/models/gemini-2.5-flash:generateContent"
  media:
    mode: mock
    default_response:
      code: 200
      body: "{}"
  postgres:
    mode: live
    protocol: postgres
    url: "postgres://postgres:postgres@127.0.0.1:5432/postgres?sslmode=disable"
  whatsapp:
    mode: mock
    url: "/v1/messages"
    default_response:
      code: 200
      body: '{"messaging_product":"whatsapp","messages":[{"id":"wamid.test"}]}'

entrypoints:
  maxcalls:
    type: http
    method: POST
    path: "/maxcalls"
  auth_redirect:
    type: http
    method: GET
    path: "/auth?state=abc123"
    follow_redirects: false
